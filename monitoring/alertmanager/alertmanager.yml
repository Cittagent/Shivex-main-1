global:
  resolve_timeout: 5m

route:
  receiver: webhook-default
  group_by: ["alertname", "service", "snapshot_key"]
  group_wait: 30s
  group_interval: 2m
  repeat_interval: 10m

receivers:
  - name: webhook-default
    webhook_configs:
      - url: "http://host.docker.internal:9999/alerts"
        send_resolved: true
